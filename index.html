<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocab Bluff</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #F7F7F7; min-height: 100vh; color: #3C3C3C; }
    .container { max-width: 500px; margin: 0 auto; padding: 16px; }
    .card { background: white; border-radius: 16px; border: 2px solid #E5E5E5; padding: 24px; margin-bottom: 16px; }
    .btn { background: #58CC02; color: white; border: none; padding: 14px 24px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; box-shadow: 0 4px 0 #46A302; position: relative; top: 0; }
    .btn:active { box-shadow: 0 2px 0 #46A302; top: 2px; }
    .btn:disabled { background: #E5E5E5; box-shadow: 0 4px 0 #CECECE; color: #AFAFAF; }
    .btn-secondary { background: white; color: #1CB0F6; border: 2px solid #E5E5E5; box-shadow: 0 4px 0 #E5E5E5; }
    .btn-vote { background: #CE82FF; box-shadow: 0 4px 0 #A560CC; }
    .btn-results { background: #FF9600; box-shadow: 0 4px 0 #CC7800; }
    .btn-small { padding: 12px 20px; font-size: 14px; width: auto; }
    .input { width: 100%; background: white; border: 2px solid #E5E5E5; border-radius: 16px; padding: 14px 16px; font-size: 16px; font-family: inherit; margin-bottom: 12px; }
    .input:focus { outline: none; border-color: #1CB0F6; }
    .textarea { min-height: 100px; resize: vertical; }
    .word-display { font-size: 2.5rem; font-weight: 800; color: #58CC02; text-align: center; margin: 16px 0; text-transform: capitalize; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #E5E5E5; background: white; color: #AFAFAF; cursor: pointer; font-weight: 700; }
    .tab.active { background: #DDF4FF; border-color: #1CB0F6; color: #1CB0F6; }
    .def-card { background: white; border: 2px solid #E5E5E5; border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
    .def-card:hover { border-color: #1CB0F6; }
    .def-card.selected { border-color: #58CC02; border-width: 3px; background: #F0FDF0; }
    .badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .badge-submit { background: #DDF4FF; color: #1CB0F6; }
    .badge-vote { background: #F3E5FF; color: #CE82FF; }
    .badge-results { background: #FFF3E0; color: #FF9600; }
    .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; background: #F7F7F7; }
    .lb-row.me { background: #F0FDF0; border: 2px solid #58CC02; }
    .lb-points { color: #FF9600; font-weight: 800; font-size: 18px; }
    .lb-stats { color: #AFAFAF; font-size: 12px; }
    .round-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: white; border: 2px solid #E5E5E5; border-radius: 16px; margin-bottom: 12px; cursor: pointer; }
    .round-item:hover { border-color: #58CC02; }
    .round-word { font-size: 1.25rem; font-weight: 700; text-transform: capitalize; }
    .result-card { background: white; border: 2px solid #E5E5E5; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .result-card.truth { background: #F0FDF0; border-color: #58CC02; border-width: 3px; }
    .result-truth-badge { display: inline-block; background: #58CC02; color: white; padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 700; margin-left: 8px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin-bottom: 16px; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 32px; }
    .logo-text { font-size: 22px; font-weight: 800; color: #58CC02; }
    .username { background: #F7F7F7; padding: 8px 12px; border-radius: 12px; font-weight: 700; color: #777; }
    .signout { background: none; border: none; color: #AFAFAF; cursor: pointer; font-weight: 600; margin-left: 12px; }
    .back-btn { background: none; border: none; color: #1CB0F6; cursor: pointer; margin-bottom: 16px; font-weight: 700; }
    .step { display: flex; gap: 12px; color: #777; font-size: 14px; margin-bottom: 12px; }
    .step-num { background: #58CC02; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
    .invite-code { font-family: monospace; background: #F7F7F7; padding: 4px 10px; border-radius: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .truth-notice { background: #F0FDF0; border: 2px solid #58CC02; border-radius: 12px; padding: 12px 16px; margin-top: 12px; display: flex; align-items: center; gap: 8px; }
    .real-def-box { background: #FFFBEB; border: 2px dashed #FFD93D; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .real-def-label { font-size: 12px; font-weight: 700; color: #B8860B; text-transform: uppercase; margin-bottom: 8px; }
    .center { text-align: center; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .text-muted { color: #AFAFAF; }
    .text-small { font-size: 14px; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .flex-1 { flex: 1; }
    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .loading { text-align: center; padding: 60px 20px; font-weight: 700; color: #AFAFAF; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.39.0';
    import { html, render, useState, useEffect } from 'https://esm.sh/htm/preact/standalone';

    // ============================================
    // CONFIGURATION - UPDATE THESE VALUES!
    // ============================================
    const SUPABASE_URL = 'https://azczbwojvdqmzufdyhbw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6Y3pid29qdmRxbXp1ZmR5aGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzYxMDksImV4cCI6MjA5NzgxMjEwOX0.x-6cdRcLH71_Had2SGlcAbwT_oJ9MXVAiv0JwGLqJ08';
    // ============================================

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('groups');
      const [activeGroup, setActiveGroup] = useState(null);
      const [activeRound, setActiveRound] = useState(null);

      useEffect(() => {
        checkUser();
        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          setUser(session?.user ?? null);
          if (session?.user) loadProfile(session.user.id);
          else setProfile(null);
        });
        return () => subscription.unsubscribe();
      }, []);

      const checkUser = async () => {
        const { data: { user } } = await supabase.auth.getUser();
        setUser(user);
        if (user) await loadProfile(user.id);
        setLoading(false);
      };

      const loadProfile = async (userId) => {
        const { data } = await supabase.from('profiles').select('*').eq('id', userId).single();
        setProfile(data);
      };

      const signOut = async () => {
        await supabase.auth.signOut();
        setView('groups');
        setActiveGroup(null);
        setActiveRound(null);
      };

      if (loading) return html`<div class="container"><div class="loading">Loading...</div></div>`;
      if (!user) return html`<${Auth} />`;

      return html`
        <div class="container">
          <header class="header">
            <div class="logo">
              <span class="logo-icon">🎭</span>
              <span class="logo-text">Vocab Bluff</span>
            </div>
            <div style="display: flex; align-items: center;">
              <span class="username">@${profile?.username}</span>
              <button class="signout" onClick=${signOut}>Sign out</button>
            </div>
          </header>

          ${view === 'round' && activeRound && html`
            <button class="back-btn" onClick=${() => setView('group')}>← Back to ${activeGroup?.name}</button>
            <${GameRound} round=${activeRound} userId=${user.id} onBack=${() => setView('group')} onUpdate=${(r) => setActiveRound(r)} />
          `}

          ${view === 'group' && activeGroup && html`
            <button class="back-btn" onClick=${() => setView('groups')}>← All Groups</button>
            <${GroupDetail} group=${activeGroup} userId=${user.id} onSelectRound=${(r) => { setActiveRound(r); setView('round'); }} />
          `}

          ${view === 'groups' && html`
            <${GroupList} userId=${user.id} onSelectGroup=${(g) => { setActiveGroup(g); setView('group'); }} />
          `}
        </div>
      `;
    }

    // ============================================
    // AUTH
    // ============================================
    function Auth() {
      const [mode, setMode] = useState('signin');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [username, setUsername] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [confirmationSent, setConfirmationSent] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);

        if (mode === 'signup') {
          const { error } = await supabase.auth.signUp({ email, password, options: { data: { username } } });
          if (error) setError(error.message);
          else setConfirmationSent(true);
        } else {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) setError(error.message);
        }
        setLoading(false);
      };

      // Show only confirmation message after signup
      if (confirmationSent) {
        return html`
          <div class="container" style="padding-top: 60px;">
            <div class="card center">
              <div style="font-size: 72px; margin-bottom: 16px;">📬</div>
              <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 12px;">Check your email!</h2>
              <p style="color: #666; line-height: 1.6;">We sent a confirmation link to <strong>${email}</strong></p>
              <p style="color: #666; line-height: 1.6; margin-top: 8px;">Click the link in the email to activate your account.</p>
              <button class="btn btn-secondary mt-4" onClick=${() => { setConfirmationSent(false); setMode('signin'); }}>← Back to Sign In</button>
            </div>
          </div>
        `;
      }

      return html`
        <div class="container" style="padding-top: 40px;">
          <div class="card">
            <div class="center mb-4">
              <div style="font-size: 72px;">🎭</div>
              <h1 style="font-size: 28px; font-weight: 800; color: #58CC02;">Vocab Bluff</h1>
              <p class="text-muted">Learn SAT words by fooling your friends!</p>
            </div>
            <div class="tabs">
              <button class="tab ${mode === 'signin' ? 'active' : ''}" onClick=${() => setMode('signin')}>Sign In</button>
              <button class="tab ${mode === 'signup' ? 'active' : ''}" onClick=${() => setMode('signup')}>Sign Up</button>
            </div>
            <form onSubmit=${handleSubmit}>
              ${mode === 'signup' && html`<input class="input" type="text" placeholder="Username" value=${username} onInput=${(e) => setUsername(e.target.value)} required />`}
              <input class="input" type="email" placeholder="Email" value=${email} onInput=${(e) => setEmail(e.target.value)} required />
              <input class="input" type="password" placeholder="Password" value=${password} onInput=${(e) => setPassword(e.target.value)} required minLength="6" />
              ${error && html`<p style="color: #FF4B4B; margin-bottom: 12px;">${error}</p>`}
              <button class="btn" type="submit" disabled=${loading}>${loading ? 'Loading...' : mode === 'signin' ? 'Sign In' : 'Create Account'}</button>
            </form>
            <div style="margin-top: 24px; padding-top: 20px; border-top: 2px solid #E5E5E5;">
              <h4 style="color: #AFAFAF; font-size: 12px; text-transform: uppercase; margin-bottom: 16px;">How It Works</h4>
              <div class="step"><span class="step-num">1</span><span>Join a group with friends</span></div>
              <div class="step"><span class="step-num">2</span><span>One person gets the real definition, others make up fakes</span></div>
              <div class="step"><span class="step-num">3</span><span>Vote on which is real</span></div>
              <div class="step"><span class="step-num">4</span><span>Score points for fooling friends!</span></div>
            </div>
          </div>
        </div>
      `;
    }

    // ============================================
    // GROUP LIST
    // ============================================
    function GroupList({ userId, onSelectGroup }) {
      const [groups, setGroups] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showCreate, setShowCreate] = useState(false);
      const [showJoin, setShowJoin] = useState(false);
      const [newName, setNewName] = useState('');
      const [joinCode, setJoinCode] = useState('');
      const [error, setError] = useState(null);

      useEffect(() => { loadGroups(); }, []);

      const loadGroups = async () => {
        const { data } = await supabase.from('group_members').select('groups(*)').eq('user_id', userId);
        setGroups(data?.map(d => d.groups).filter(Boolean) || []);
        setLoading(false);
      };

      const createGroup = async (e) => {
        e.preventDefault();
        setError(null);
        const { data: group, error: err } = await supabase.from('groups').insert({ name: newName.trim(), created_by: userId }).select().single();
        if (err) { setError(err.message); return; }
        await supabase.from('group_members').insert({ group_id: group.id, user_id: userId });
        await supabase.from('scores').insert({ group_id: group.id, user_id: userId });
        setNewName(''); setShowCreate(false); loadGroups();
      };

      const joinGroup = async (e) => {
        e.preventDefault();
        setError(null);
        const { data: group } = await supabase.from('groups').select().eq('invite_code', joinCode.trim().toLowerCase()).single();
        if (!group) { setError('Group not found!'); return; }
        const { data: existing } = await supabase.from('group_members').select().eq('group_id', group.id).eq('user_id', userId).single();
        if (existing) { setError("You're already in this group!"); return; }
        await supabase.from('group_members').insert({ group_id: group.id, user_id: userId });
        await supabase.from('scores').insert({ group_id: group.id, user_id: userId });
        setJoinCode(''); setShowJoin(false); loadGroups();
      };

      if (loading) return html`<div class="loading">Loading groups...</div>`;

      return html`
        <div>
          <div class="center mb-4">
            <h2 style="font-size: 24px; font-weight: 800;">Your Groups</h2>
            <p class="text-muted">Play Vocab Bluff with friends</p>
          </div>
          <div class="flex gap-2 mb-4">
            <button class="btn btn-small flex-1" onClick=${() => { setShowCreate(true); setShowJoin(false); }}>➕ Create</button>
            <button class="btn btn-secondary btn-small flex-1" onClick=${() => { setShowJoin(true); setShowCreate(false); }}>🔗 Join</button>
          </div>
          ${showCreate && html`
            <form class="card" onSubmit=${createGroup}>
              <h3 class="mb-3" style="font-weight: 700;">Create a New Group</h3>
              <input class="input" placeholder="Group name" value=${newName} onInput=${(e) => setNewName(e.target.value)} />
              ${error && html`<p style="color: #FF4B4B;">${error}</p>`}
              <div class="flex gap-2">
                <button class="btn btn-small flex-1" type="submit">Create</button>
                <button class="btn btn-secondary btn-small" type="button" onClick=${() => setShowCreate(false)}>Cancel</button>
              </div>
            </form>
          `}
          ${showJoin && html`
            <form class="card" onSubmit=${joinGroup}>
              <h3 class="mb-3" style="font-weight: 700;">Join a Group</h3>
              <input class="input" placeholder="Enter code" value=${joinCode} onInput=${(e) => setJoinCode(e.target.value)} style="font-family: monospace; text-align: center; font-size: 24px;" maxLength="6" />
              ${error && html`<p style="color: #FF4B4B;">${error}</p>`}
              <div class="flex gap-2">
                <button class="btn btn-small flex-1" type="submit">Join</button>
                <button class="btn btn-secondary btn-small" type="button" onClick=${() => setShowJoin(false)}>Cancel</button>
              </div>
            </form>
          `}
          ${groups.length === 0 ? html`
            <div class="card empty-state">
              <div class="empty-icon">🎭</div>
              <div style="font-size: 20px; font-weight: 700;">No groups yet!</div>
              <div class="text-muted">Create or join a group to play.</div>
            </div>
          ` : groups.map(group => {
            const isOwner = group.created_by === userId;
            
            const leaveGroup = async (e) => {
              e.stopPropagation();
              if (!confirm('Are you sure you want to leave this group?')) return;
              await supabase.from('scores').delete().eq('group_id', group.id).eq('user_id', userId);
              await supabase.from('group_members').delete().eq('group_id', group.id).eq('user_id', userId);
              loadGroups();
            };
            
            const deleteGroup = async (e) => {
              e.stopPropagation();
              if (!confirm('Are you sure you want to DELETE this group? This cannot be undone!')) return;
              await supabase.from('groups').delete().eq('id', group.id);
              loadGroups();
            };
            
            return html`
              <div class="round-item" style="position: relative;">
                <div style="cursor: pointer; flex: 1;" onClick=${() => onSelectGroup(group)}>
                  <div class="round-word">${group.name}</div>
                  <div class="text-small text-muted">Code: <span class="invite-code">${group.invite_code}</span></div>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                  <button 
                    onClick=${leaveGroup} 
                    title="Leave group"
                    style="background: none; border: none; cursor: pointer; font-size: 18px; opacity: 0.4; padding: 4px;"
                    onMouseOver=${(e) => e.target.style.opacity = '1'}
                    onMouseOut=${(e) => e.target.style.opacity = '0.4'}
                  >🚪</button>
                  ${isOwner && html`
                    <button 
                      onClick=${deleteGroup} 
                      title="Delete group"
                      style="background: none; border: none; cursor: pointer; font-size: 18px; opacity: 0.4; padding: 4px;"
                      onMouseOver=${(e) => e.target.style.opacity = '1'}
                      onMouseOut=${(e) => e.target.style.opacity = '0.4'}
                    >🗑️</button>
                  `}
                  <span style="font-size: 24px; cursor: pointer; margin-left: 4px;" onClick=${() => onSelectGroup(group)}>→</span>
                </div>
              </div>
            `;
          })}
        </div>
      `;
    }

    // ============================================
    // GROUP DETAIL
    // ============================================
    function GroupDetail({ group, userId, onSelectRound }) {
      const [rounds, setRounds] = useState([]);
      const [scores, setScores] = useState([]);
      const [members, setMembers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [creating, setCreating] = useState(false);

      useEffect(() => { loadData(); }, [group.id]);

      const loadData = async () => {
        const [r, s, m] = await Promise.all([
          supabase.from('rounds').select('*, words(*)').eq('group_id', group.id).order('created_at', { ascending: false }).limit(10),
          supabase.from('scores').select('*, profiles(*)').eq('group_id', group.id).order('total_points', { ascending: false }),
          supabase.from('group_members').select('*, profiles(*)').eq('group_id', group.id)
        ]);
        setRounds(r.data || []); setScores(s.data || []); setMembers(m.data || []); setLoading(false);
      };

      const startRound = async () => {
        setCreating(true);
        const { data: words } = await supabase.from('words').select('id');
        const usedIds = rounds.slice(0, 10).map(r => r.word_id);
        const available = words.filter(w => !usedIds.includes(w.id));
        const word = available.length > 0 ? available[Math.floor(Math.random() * available.length)] : words[Math.floor(Math.random() * words.length)];
        await supabase.from('rounds').insert({ group_id: group.id, word_id: word.id, phase: 'submitting' });
        await loadData(); setCreating(false);
      };

      const getPhase = (p) => ({ submitting: { l: '✍️ Submit', c: 'badge-submit' }, voting: { l: '🗳️ Vote', c: 'badge-vote' }, results: { l: '🏆 Results', c: 'badge-results' } }[p] || { l: p, c: '' });

      if (loading) return html`<div class="loading">Loading...</div>`;

      return html`
        <div>
          <div class="card center">
            <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">${group.name}</h2>
            <p class="text-muted mb-3">${members.length} players • Code: <span class="invite-code">${group.invite_code}</span></p>
            <button class="btn" onClick=${startRound} disabled=${creating}>${creating ? 'Starting...' : '🎲 Start New Round'}</button>
          </div>

          <h3 style="font-weight: 700; margin: 24px 0 12px;">📚 Recent Rounds</h3>
          ${rounds.length === 0 ? html`<div class="card center"><p class="text-muted">No rounds yet. Start one!</p></div>` : rounds.map(round => html`
            <div class="round-item" onClick=${() => onSelectRound(round)}>
              <span class="round-word">${round.words?.word}</span>
              <span class="badge ${getPhase(round.phase).c}">${getPhase(round.phase).l}</span>
            </div>
          `)}
          <h3 style="font-weight: 700; margin: 24px 0 12px;">🏆 Leaderboard</h3>
          ${scores.length === 0 ? html`<div class="card center"><p class="text-muted">Play to earn points!</p></div>` : scores.map((s, i) => html`
            <div class="lb-row ${s.user_id === userId ? 'me' : ''}">
              <div style="display: flex; align-items: center;">
                <span style="font-size: 24px; margin-right: 12px;">${s.total_points > 0 ? (i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i+1)) : '•'}</span>
                <span style="font-weight: 700;">@${s.profiles?.username}</span>
              </div>
              <div style="text-align: right;">
                <div class="lb-points">${s.total_points} pts</div>
                <div class="lb-stats">${s.fools} 🎭 • ${s.correct_guesses} ✓</div>
              </div>
            </div>
          `)}
        </div>
      `;
    }

    // ============================================
    // GAME ROUND
    // ============================================
    function GameRound({ round, userId, onBack, onUpdate }) {
      const [word, setWord] = useState(null);
      const [submissions, setSubmissions] = useState([]);
      const [mySubmission, setMySubmission] = useState(null);
      const [myVote, setMyVote] = useState(null);
      const [allVotes, setAllVotes] = useState([]);
      const [definition, setDefinition] = useState('');
      const [selected, setSelected] = useState(null);
      const [loading, setLoading] = useState(true);
      const [submitting, setSubmitting] = useState(false);
      const [shuffledOptions, setShuffledOptions] = useState([]);

      useEffect(() => { loadRound(); }, [round.id, round.phase]);

      const loadRound = async () => {
        const [w, s, v, av] = await Promise.all([
          supabase.from('words').select('*').eq('id', round.word_id).single(),
          supabase.from('submissions').select('*, profiles(*)').eq('round_id', round.id),
          supabase.from('votes').select('*').eq('round_id', round.id).eq('voter_id', userId).single(),
          supabase.from('votes').select('*, profiles:voter_id(username)').eq('round_id', round.id)
        ]);
        setWord(w.data);
        const subs = s.data || [];
        setSubmissions(subs);
        setMySubmission(subs.find(x => x.user_id === userId));
        setMyVote(v.data);
        setAllVotes(av.data || []);
        
        // Create shuffled options: all submissions + the real definition
        if (w.data) {
          const fakeOptions = subs.map(sub => ({ 
            id: sub.id, 
            definition: sub.definition, 
            isReal: false, 
            oderId: sub.user_id
          }));
          const realOption = { 
            id: 'real', 
            definition: w.data.definition, 
            isReal: true, 
            oderId: null
          };
          const allOptions = [...fakeOptions, realOption].sort(() => Math.random() - 0.5);
          setShuffledOptions(allOptions);
        }
        
        setLoading(false);
      };

      const submitDef = async () => {
        setSubmitting(true);
        await supabase.from('submissions').insert({ round_id: round.id, user_id: userId, definition: definition.trim(), is_truth: false });
        setDefinition(''); await loadRound(); setSubmitting(false);
      };

      const toVoting = async () => { await supabase.from('rounds').update({ phase: 'voting' }).eq('id', round.id); onUpdate({ ...round, phase: 'voting' }); };

      const submitVote = async () => {
        if (!selected) return;
        setSubmitting(true);
        // Store the selected id (could be 'real' or a submission id)
        await supabase.from('votes').insert({ round_id: round.id, voter_id: userId, submission_id: selected === 'real' ? null : selected });
        await loadRound(); setSubmitting(false);
      };

      const toResults = async () => {
        const { data: votes } = await supabase.from('votes').select('*').eq('round_id', round.id);
        const { data: rd } = await supabase.from('rounds').select('group_id').eq('id', round.id).single();
        
        // Award points for fooling others (votes on fake submissions)
        for (const sub of submissions) {
          const fools = votes?.filter(v => v.submission_id === sub.id).length || 0;
          if (fools > 0) {
            const { data: sc } = await supabase.from('scores').select('*').eq('group_id', rd.group_id).eq('user_id', sub.user_id).single();
            if (sc) await supabase.from('scores').update({ total_points: sc.total_points + fools * 2, fools: sc.fools + fools }).eq('id', sc.id);
          }
        }
        
        // Award points for correct guesses (votes where submission_id is null = voted for real)
        const correctVoters = votes?.filter(v => v.submission_id === null) || [];
        for (const v of correctVoters) {
          const { data: sc } = await supabase.from('scores').select('*').eq('group_id', rd.group_id).eq('user_id', v.voter_id).single();
          if (sc) await supabase.from('scores').update({ total_points: sc.total_points + 1, correct_guesses: sc.correct_guesses + 1 }).eq('id', sc.id);
        }
        
        await supabase.from('rounds').update({ phase: 'results' }).eq('id', round.id);
        onUpdate({ ...round, phase: 'results' });
      };

      if (loading) return html`<div class="loading">Loading...</div>`;

      if (round.phase === 'submitting') {
        return html`
          <div>
            <div class="card center">
              <p class="text-muted mb-2" style="font-weight: 600;">Today's word:</p>
              <div class="word-display">${word?.word}</div>
            </div>
            ${mySubmission ? html`
              <div class="card">
                <p class="text-muted mb-2" style="font-weight: 600;">Your fake definition:</p>
                <p>${mySubmission.definition}</p>
                <p class="text-muted text-small mt-4">⏳ Waiting for others... (${submissions.length} submitted)</p>
                ${submissions.length >= 2 && html`<button class="btn btn-vote mt-4" onClick=${toVoting}>Start Voting →</button>`}
              </div>
            ` : html`
              <div class="card">
                <p class="mb-3" style="font-weight: 600;">🎭 Make up a fake definition:</p>
                <p class="text-muted text-small mb-3">Write something that sounds real but isn't! Try to fool your friends.</p>
                <textarea class="input textarea" value=${definition} onInput=${(e) => setDefinition(e.target.value)} placeholder="Write a convincing fake definition..."></textarea>
                <button class="btn" onClick=${submitDef} disabled=${submitting || !definition.trim()}>${submitting ? 'Submitting...' : 'Submit'}</button>
              </div>
            `}
          </div>
        `;
      }

      if (round.phase === 'voting') {
        return html`
          <div>
            <div class="card center">
              <p class="text-muted mb-2" style="font-weight: 600;">Which is the REAL definition?</p>
              <div class="word-display">${word?.word}</div>
              <p class="text-muted text-small mt-2">One of these is real. The rest are fakes!</p>
            </div>
            ${myVote ? html`
              <div class="card center">
                <p style="font-weight: 600;">✅ You voted!</p>
                <p class="text-muted mb-4">Waiting for others...</p>
                <button class="btn btn-results" onClick=${toResults}>See Results →</button>
              </div>
            ` : html`
              <div>
                ${shuffledOptions.map(opt => html`
                  <div 
                    class="def-card ${selected === opt.id ? 'selected' : ''} ${opt.oderId === userId ? 'yours' : ''}" 
                    onClick=${() => opt.oderId !== userId && setSelected(opt.id)}
                    style="${opt.oderId === userId ? 'opacity: 0.6; cursor: not-allowed; border-style: dashed;' : ''}"
                  >
                    ${opt.definition}
                    ${opt.oderId === userId ? html`<p style="font-size: 11px; color: #AFAFAF; margin-top: 8px; font-style: italic;">— Your submission (can't vote for your own)</p>` : ''}
                  </div>
                `)}
                <button class="btn btn-vote mt-3" onClick=${submitVote} disabled=${submitting || !selected}>${submitting ? 'Voting...' : 'Submit Vote'}</button>
              </div>
            `}
          </div>
        `;
      }

      // Results phase
      const realVotes = allVotes.filter(v => v.submission_id === null);
      
      return html`
        <div>
          <div class="card center" style="background: #F0FDF0; border-color: #58CC02;">
            <p class="text-muted mb-2" style="font-weight: 600;">✓ The real definition:</p>
            <div class="word-display">${word?.word}</div>
            <p style="font-size: 18px; line-height: 1.5; margin-top: 12px;">${word?.definition}</p>
            ${word?.example_sentence && html`<p class="text-muted text-small mt-3" style="font-style: italic;">"${word.example_sentence}"</p>`}
            ${realVotes.length > 0 && html`
              <p style="margin-top: 12px; font-size: 14px; color: #58CC02; font-weight: 600;">
                ✓ ${realVotes.length} correct vote${realVotes.length !== 1 ? 's' : ''}
              </p>
            `}
          </div>
          
          ${submissions.length > 0 && html`
            <h3 style="font-weight: 700; margin: 24px 0 12px;">🎭 The fakes:</h3>
            ${submissions.map(sub => {
              const voteCount = allVotes.filter(v => v.submission_id === sub.id).length;
              return html`
                <div class="result-card">
                  <p>${sub.definition}</p>
                  <p style="font-size: 12px; color: #AFAFAF; margin-top: 8px;">— @${sub.profiles?.username}</p>
                  ${voteCount > 0 && html`
                    <p style="font-size: 13px; color: #FF9600; margin-top: 6px; font-weight: 600;">
                      🎭 Fooled ${voteCount} player${voteCount !== 1 ? 's' : ''} (+${voteCount * 2} pts)
                    </p>
                  `}
                </div>
              `;
            })}
          `}
          
          <button class="btn btn-secondary mt-4" onClick=${onBack}>← Back to Group</button>
        </div>
      `;
    }

    // ============================================
    // RENDER
    // ============================================
    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
